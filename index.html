<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css?v=20260406a" />
  <title>Learnagochi</title>
</head>
<body>
  <section id="start-screen" class="main-title">
    <img id="title-img" src="assets/Title.png" alt="Learnagochi Title" />
    <img id="start-button" src="assets/Start-button.png" alt="Start Game" />
    <img id="exit-button" src="assets/Exit-button.png" alt="Exit Game" />
  </section>

  <section id="cutscene-screen" class="cutscene" style="display: none;">
    <img src="assets/Enter your name_.png" alt="Enter your name" />
    <img src="assets/Hey, What's your name_.png" alt="Hey, What's your name?" />

    <form id="name-form" class="name-form">
      <input
        type="text"
        id="player-name"
        placeholder="Type your name..."
        maxlength="12"
        required
        autocomplete="off"
      />
      <button type="submit" id="enter-name-button">Enter</button>
      <p class="name-hint">Press Enter key or click Enter button</p>
    </form>

    <img
      id="google-signin"
      src="assets/Google.png"
      alt="Sign in with Google"
      style="cursor: pointer"
    />
  </section>

  <section id="intro-sequence" class="intro-sequence" style="display: none;">
    <div id="rainy-scene" class="scene">
      <img src="assets/3.png" alt="Rainy view" />
      <div class="scene-text">
        <p>It is so rainy today....</p>
        <p>I should at least get something done today.</p>
      </div>
    </div>

    <div id="story-scene" class="scene story-scene" style="display: none;">
      <div class="story-card">
        <div class="story-sprite-wrap">
          <canvas id="story-canvas" class="story-sprite-canvas" aria-label="Duck rescue story animation" role="img"></canvas>
        </div>
        <div class="story-copy">
          <p id="story-step" class="story-step">Scene 1 / 12</p>
          <p id="story-line">In a rainy pond, you found a small injured duck.</p>
          <p id="story-subline">You chose to take it in and care for it.</p>
        </div>
      </div>
    </div>

    <div id="loading-scene" class="scene" style="display: none;">
      <img src="assets/4.png" alt="Loading scene" />
      <div class="loading-text">Loading<span class="loading-dots"></span></div>
      <div class="loading-bar">
        <div class="loading-bar-fill"></div>
      </div>
    </div>

    <button id="skip-intro" type="button">Skip intro...&gt;</button>
  </section>

  <footer class="socials">
    <a href="https://instagram.com/nexusthenextgen" target="_blank" rel="noopener">
      <img id="instagram-icon" src="assets/Instagram.png" alt="Instagram" />
    </a>
    <a href="https://facebook.com/nexusnextgen" target="_blank" rel="noopener">
      <img id="facebook" src="assets/Facebook.png" alt="Facebook" />
    </a>
  </footer>

  <video autoplay muted loop id="bg-video">
    <source src="assets/rainypond.mp4" type="video/mp4" />
  </video>

  <audio id="bg-music" src="assets/bg-music.mp3" autoplay loop></audio>
  <img id="volume-button" src="assets/Volume-on.png" alt="Toggle Volume" />
  <div id="fade-overlay"></div>

  <script src="renderer.js?v=20260406b"></script>
</body>
</html>
